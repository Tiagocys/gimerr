<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Gimerr</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Gimerr">
        <img class="brand-logo" src="./assets/logo.svg" alt="Gimerr">
      </a>

      <div class="search-box">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 5.1-2.1l4 4-1.4 1.4-4-4a7.3 7.3 0 0 1-3.7 1Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Z"/>
        </svg>
        <input id="global-search" type="search" placeholder="Buscar jogos e anúncios" aria-label="Buscar jogos, anúncios e usuários">
      </div>

      <nav class="top-actions" aria-label="Ações principais">
        <button class="primary-button navbar-create-listing" id="open-composer" type="button" data-create-listing-button aria-controls="composer" aria-expanded="false">
          + Criar
        </button>
        <a class="auth-button" href="./sign-in.html" hidden>Entrar</a>
        <div class="account-menu" data-account-menu hidden></div>
      </nav>
    </header>

    <main class="layout">
      <aside class="left-rail" aria-label="Navegação" hidden>
        <section class="panel" id="followed-games-panel">
          <div class="section-head">
            <h2>Games seguidos</h2>
            <span id="server-count">0</span>
          </div>
          <div class="server-list" id="server-list"></div>
        </section>

      </aside>

      <section class="feed-column" aria-label="Feed">
        <section class="composer is-listing-mode" id="composer" hidden>
          <div class="composer-mobile-head">
            <h2 id="composer-title">Nova publicação</h2>
            <button class="ghost-icon" id="close-composer" type="button" aria-label="Fechar novo anúncio">x</button>
          </div>
          <div class="composer-tabs" role="tablist" aria-label="Tipo de publicação" hidden>
            <button class="tab-button" type="button" data-composer-mode="post" role="tab" aria-selected="false">Post</button>
            <button class="tab-button is-active" type="button" data-composer-mode="listing" role="tab" aria-selected="true">Anúncio</button>
          </div>
          <textarea id="composer-text" rows="4" maxlength="1200" placeholder="Descreva seu anúncio: itens, condições de compra, troca, entrega ou outras informações importantes."></textarea>
          <div class="composer-mention-suggestions" id="composer-mention-suggestions" hidden></div>
          <div class="listing-video-upload">
            <label class="text-button upload-button" for="composer-file">
              <svg id="composer-file-icon" aria-hidden="true" viewBox="0 0 24 24">
                <path d="M17 10.5V6c0-1.1-.9-2-2-2H5C3.9 4 3 4.9 3 6v12c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-4.5l4 4v-11l-4 4Z"/>
              </svg>
              <span id="composer-file-label">Adicionar vídeo</span>
            </label>
            <span id="composer-file-helper">Opcional: 1 vídeo de até 3 minutos e 500 MB.</span>
            <input id="composer-file" class="composer-video-input" type="file" accept="video/mp4,video/webm,video/quicktime">
          </div>
          <p class="composer-step-helper" id="composer-video-helper" hidden></p>
          <div class="composer-media" id="composer-media" hidden>
            <div class="composer-media-summary">
              <span id="composer-file-name"></span>
              <div class="composer-media-previews" id="composer-media-previews"></div>
            </div>
            <button class="text-button" id="composer-clear-file" type="button">Remover</button>
          </div>
          <div class="listing-composer-fields" id="listing-composer-fields">
            <div class="listing-meta-row">
              <label class="listing-currency-field" for="listing-currency">
                <span>Moeda do anúncio</span>
                <select id="listing-currency">
                  <option value="">Selecione uma moeda</option>
                  <option value="BRL">BRL - Real brasileiro</option>
                  <option value="USD">USD - Dólar americano</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="JPY">JPY - Iene japonês</option>
                  <option value="GBP">GBP - Libra esterlina</option>
                  <option value="CNY">CNY - Yuan chinês</option>
                </select>
              </label>
              <label class="composer-game-field" for="composer-game-search">
                <span id="composer-game-label">Jogo do anúncio</span>
                <div class="composer-game-combobox">
                  <input id="composer-game-search" type="search" autocomplete="off" placeholder="Buscar jogo">
                  <input id="composer-server" type="hidden">
                  <div class="composer-game-selected" id="composer-game-selected" hidden></div>
                  <div class="composer-game-suggestions" id="composer-game-suggestions" hidden></div>
                </div>
              </label>
            </div>
            <div class="listing-items" id="listing-items">
              <div class="listing-item-row" data-listing-item-row data-listing-item-id="index-listing-item-1">
                <label>
                  <span>Item</span>
                  <input type="text" data-listing-item-name maxlength="60" placeholder="Nome do item">
                </label>
                <label>
                  <span>Preço</span>
                  <div class="price-input">
                    <span>Moeda</span>
                    <input type="number" data-listing-item-price min="0" step="0.01" inputmode="decimal" placeholder="0,00">
                  </div>
                </label>
                <label class="listing-item-image-field">
                  <span>Imagem (opcional)</span>
                  <input type="file" data-listing-item-image accept="image/jpeg,image/png,image/webp,image/gif">
                  <div class="listing-item-image-preview">
                    <span>Selecionar imagem</span>
                  </div>
                </label>
                <button class="ghost-icon listing-item-remove" type="button" data-listing-item-remove aria-label="Limpar item">x</button>
              </div>
            </div>
            <button class="text-button listing-item-add" id="listing-item-add" type="button">Adicione mais 14 itens</button>
          </div>
          <div class="composer-footer">
            <p class="composer-submit-helper" id="composer-listing-helper" hidden></p>
            <div class="composer-actions">
              <button class="text-button" id="cancel-listing-edit" type="button" hidden>Cancelar edição</button>
              <button class="primary-button" id="publish-post" type="button">Publicar anúncio</button>
            </div>
          </div>
        </section>

        <div class="filter-bar" aria-label="Filtrar feed" hidden>
          <button class="filter-chip is-active" type="button" data-filter="all">
            Tudo
            <span class="filter-count" data-filter-count="all" hidden>0</span>
          </button>
          <button class="filter-chip" type="button" data-filter="listing">
            Marketplace
            <span class="filter-count" data-filter-count="listing" hidden>0</span>
          </button>
        </div>

        <div class="marketplace-feed-search" id="marketplace-feed-search">
          <label for="marketplace-search">Buscar no Marketplace</label>
          <input id="marketplace-search" type="search" placeholder="Buscar anúncio, game, item ou vendedor">
        </div>

        <div class="feed-list" id="feed-list">
          <article class="post-card feed-skeleton" aria-label="Carregando feed"></article>
          <article class="post-card feed-skeleton" aria-label="Carregando feed"></article>
        </div>
      </section>

    </main>
  </div>

  <div class="modal-backdrop" id="verification-modal" hidden>
    <section class="verification-modal" role="dialog" aria-modal="true" aria-labelledby="verification-title">
      <div class="modal-head">
        <h2 id="verification-title">Verifique sua conta para publicar</h2>
      </div>
      <div class="verification-steps" id="verification-steps"></div>
      <p class="field-feedback" id="verification-feedback" role="status"></p>
      <div class="modal-actions">
        <button class="text-button" id="verification-close" type="button">Agora não</button>
        <button class="primary-button" id="verification-primary" type="button">Verificar com Discord</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="listing-detail-modal" hidden>
    <section class="listing-detail-modal" role="dialog" aria-modal="true" aria-labelledby="listing-detail-title">
      <div id="listing-detail-content"></div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="./auth-client.js" defer></script>
  <script src="./user-search.js" defer></script>
  <script src="./navbar.js" defer></script>
  <script src="./video-player.js" defer></script>
  <script src="./adcash-ads.js?v=20260720-marketplace-inline" defer></script>
  <script src="./media-lightbox.js" defer></script>
  <script src="./vendor/qrcode.js" defer></script>
  <script src="./share-modal.js" defer></script>
  <script src="./report-modal.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
