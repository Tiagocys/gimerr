<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <meta http-equiv="Delegate-CH" content="Sec-CH-UA https://s.magsrv.com; Sec-CH-UA-Mobile https://s.magsrv.com; Sec-CH-UA-Arch https://s.magsrv.com; Sec-CH-UA-Model https://s.magsrv.com; Sec-CH-UA-Platform https://s.magsrv.com; Sec-CH-UA-Platform-Version https://s.magsrv.com; Sec-CH-UA-Bitness https://s.magsrv.com; Sec-CH-UA-Full-Version-List https://s.magsrv.com; Sec-CH-UA-Full-Version https://s.magsrv.com;">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <meta name="6a97888e-site-verification" content="fb4412f2ac7609987726bf44a5672183">
  <title>Gimerr</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Gimerr">
        <img class="brand-logo" src="./assets/logo.png" alt="Gimerr">
      </a>

      <div class="search-box">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 5.1-2.1l4 4-1.4 1.4-4-4a7.3 7.3 0 0 1-3.7 1Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Z"/>
        </svg>
        <input id="global-search" type="search" placeholder="Buscar jogos, posts e anúncios" aria-label="Buscar jogos, posts, anúncios e usuários">
      </div>

      <nav class="top-actions" aria-label="Ações principais">
        <button class="ghost-icon" type="button" aria-label="Notificações">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M12 22a2.7 2.7 0 0 0 2.5-1.7h-5A2.7 2.7 0 0 0 12 22Zm7-5.8V11a7 7 0 0 0-5.5-6.8V3a1.5 1.5 0 0 0-3 0v1.2A7 7 0 0 0 5 11v5.2l-1.6 1.6V19h17.2v-1.2L19 16.2Z"/>
          </svg>
        </button>
        <a class="auth-button" href="./sign-in.html" hidden>Entrar</a>
        <div class="account-menu" data-account-menu hidden></div>
      </nav>
    </header>

    <main class="layout">
      <aside class="left-rail" aria-label="Navegação">
        <section class="panel" id="followed-games-panel">
          <div class="section-head">
            <h2>Games seguidos</h2>
            <span id="server-count">0</span>
          </div>
          <div class="server-list" id="server-list"></div>
        </section>

      </aside>

      <section class="feed-column" aria-label="Feed">
        <div class="feed-header">
          <div>
            <h1>Feed</h1>
            <p id="feed-subtitle">Posts recentes dos games que você segue.</p>
          </div>
          <button class="primary-button" id="open-composer" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M11 5h2v6h6v2h-6v6h-2v-6H5v-2h6V5Z"/>
            </svg>
            Novo post
          </button>
        </div>

        <section class="composer" id="composer">
          <textarea id="composer-text" rows="4" maxlength="220" placeholder="Compartilhe uma jogada, chame a comunidade para jogar ou fale sobre o que você quiser."></textarea>
          <div class="composer-mention-suggestions" id="composer-mention-suggestions" hidden></div>
          <div class="composer-media" id="composer-media" hidden>
            <span id="composer-file-name"></span>
            <button class="text-button" id="composer-clear-file" type="button">Remover</button>
          </div>
          <div class="composer-footer">
            <select id="composer-server" aria-label="Game">
              <option value="">Carregando games...</option>
            </select>
            <div class="composer-actions">
              <label class="text-button upload-button" for="composer-file">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M19 13v6H5v-6H3v8h18v-8h-2ZM13 5.8l3.6 3.6L18 8l-6-6-6 6 1.4 1.4L11 5.8V16h2V5.8Z"/>
                </svg>
                Arquivo
              </label>
              <input id="composer-file" type="file" accept="image/*,video/*">
              <button class="primary-button" id="publish-post" type="button">Publicar</button>
            </div>
          </div>
        </section>

        <div class="filter-bar" role="tablist" aria-label="Filtros do feed">
          <button class="filter-chip is-active" type="button" data-filter="all">Tudo</button>
          <button class="filter-chip" type="button" data-filter="following">Seguindo</button>
          <button class="filter-chip" type="button" data-filter="video">Vídeos</button>
          <button class="filter-chip" type="button" data-filter="listing">Marketplace</button>
        </div>

        <div class="feed-list" id="feed-list">
          <article class="post-card feed-skeleton" aria-label="Carregando feed"></article>
          <article class="post-card feed-skeleton" aria-label="Carregando feed"></article>
        </div>
      </section>

      <aside class="right-rail" aria-label="Informações">
        <section class="panel live-panel" id="live-panel" hidden>
          <div class="section-head">
            <h2>Agora</h2>
            <span>ao vivo</span>
          </div>
          <div class="live-stack" id="live-stack"></div>
        </section>
      </aside>
    </main>
  </div>

  <div class="modal-backdrop" id="verification-modal" hidden>
    <section class="verification-modal" role="dialog" aria-modal="true" aria-labelledby="verification-title">
      <div class="modal-head">
        <h2 id="verification-title">Verifique sua conta para publicar</h2>
      </div>
      <p class="verification-copy">
        Para proteger a comunidade contra spam, apenas contas verificadas pelo Discord podem publicar no Gimerr.
      </p>
      <div class="verification-steps" id="verification-steps"></div>
      <p class="field-feedback" id="verification-feedback" role="status"></p>
      <div class="modal-actions">
        <button class="text-button" id="verification-close" type="button">Agora não</button>
        <button class="primary-button" id="verification-primary" type="button">Verificar com Discord</button>
      </div>
    </section>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="./auth-client.js" defer></script>
  <script src="./user-search.js" defer></script>
  <script src="./navbar.js" defer></script>
  <script src="./video-player.js" defer></script>
  <script src="./media-lightbox.js" defer></script>
  <script src="./app.js" defer></script>
</body>
</html>
