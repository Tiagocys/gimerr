<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Jogo | Gimerr</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Gimerr">
        <img class="brand-logo" src="./assets/logo.png" alt="Gimerr">
      </a>

      <div class="search-box">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 5.1-2.1l4 4-1.4 1.4-4-4a7.3 7.3 0 0 1-3.7 1Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Z"/>
        </svg>
        <input id="game-search" type="search" placeholder="Buscar jogos e usuários" aria-label="Buscar jogos e usuários">
      </div>

      <nav class="top-actions" aria-label="Ações principais">
        <a class="auth-button" href="./sign-in.html" hidden>Entrar</a>
        <div class="account-menu" data-account-menu hidden></div>
      </nav>
    </header>

    <main class="game-layout is-loading" id="game-layout">
      <section class="game-hero" aria-labelledby="game-title">
        <div class="game-summary">
          <div class="game-main">
            <div class="game-identity">
              <div class="game-title-row">
                <div class="game-logo" id="game-logo">
                  <img src="./assets/avatar.svg" alt="">
                </div>
                <h1 id="game-title">Carregando jogo...</h1>
              </div>
              <p id="game-description">Buscando informações do jogo.</p>
              <div class="game-meta-list" id="game-meta-list"></div>
            </div>
          </div>

          <div class="game-actions">
            <button class="primary-button" id="game-follow-button" type="button" disabled>Seguir</button>
          </div>
        </div>

        <div class="game-stats" aria-label="Métricas do jogo">
          <button class="stat-button" id="game-followers-button" type="button">
            <strong id="game-followers-count">0</strong>
            <span>seguidores</span>
          </button>
          <div class="stat-button stat-static">
            <strong id="game-posts-count">0</strong>
            <span>publicações</span>
          </div>
          <div class="stat-button stat-static">
            <strong id="game-listings-count">0</strong>
            <span>anúncios</span>
          </div>
        </div>
      </section>

      <section class="game-grid">
        <section class="game-content" aria-label="Feed do jogo">
          <div class="profile-feed-header">
            <div>
              <h2>Feed</h2>
              <p id="game-feed-subtitle">Conteúdo publicado para este jogo.</p>
            </div>
          </div>

          <section class="composer game-composer" id="game-composer" aria-label="Criar publicação no jogo">
            <div class="composer-tabs" role="tablist" aria-label="Tipo de publicação">
              <button class="tab-button is-active" type="button" data-game-composer-mode="post">Post</button>
              <button class="tab-button" type="button" data-game-composer-mode="listing">Anúncio</button>
            </div>
            <textarea id="game-composer-text" rows="4" maxlength="220" placeholder="Compartilhe uma jogada, chame a comunidade para jogar ou fale sobre o que você quiser."></textarea>
            <div class="listing-composer-fields" id="game-listing-composer-fields" hidden>
              <p class="composer-listing-helper" id="game-composer-listing-helper">Anúncios aceitam até 15 itens. Cada item precisa ter nome e preço. A imagem é opcional.</p>
              <label class="listing-currency-field" for="game-listing-currency">
                <span>Moeda dos itens</span>
                <select id="game-listing-currency">
                  <option value="BRL">BRL - Real brasileiro</option>
                  <option value="USD">USD - Dólar americano</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="JPY">JPY - Iene japonês</option>
                  <option value="GBP">GBP - Libra esterlina</option>
                  <option value="CNY">CNY - Yuan chinês</option>
                </select>
              </label>
              <div class="listing-items" id="game-listing-items"></div>
              <button class="text-button listing-item-add" id="game-listing-item-add" type="button">Adicionar item</button>
            </div>
            <div class="composer-media" id="game-composer-media" hidden>
              <div class="composer-media-summary">
                <span id="game-composer-file-name"></span>
                <div class="composer-media-previews" id="game-composer-media-previews"></div>
              </div>
              <button class="text-button" id="game-composer-clear-file" type="button">Remover</button>
            </div>
            <div class="composer-footer">
              <span></span>
              <div class="composer-actions">
                <label class="text-button upload-button" for="game-composer-file">
                  <svg aria-hidden="true" viewBox="0 0 24 24">
                    <path d="M19 13v6H5v-6H3v8h18v-8h-2ZM13 5.8l3.6 3.6L18 8l-6-6-6 6 1.4 1.4L11 5.8V16h2V5.8Z"/>
                  </svg>
                  Arquivo
                </label>
                <input id="game-composer-file" type="file" accept="image/*,video/*">
                <button class="primary-button" id="game-publish-post" type="button">Publicar</button>
              </div>
            </div>
            <p class="field-feedback" id="game-composer-feedback" role="status"></p>
          </section>

          <div class="filter-bar" role="tablist" aria-label="Filtros do feed do jogo">
            <button class="filter-chip is-active" type="button" data-game-feed-filter="all">Tudo</button>
            <button class="filter-chip" type="button" data-game-feed-filter="listing">Anúncios</button>
          </div>

          <div class="feed-list" id="game-feed-list"></div>
        </section>

        <aside class="game-followers-panel" aria-labelledby="game-followers-title">
          <div class="section-head">
            <h2 id="game-followers-title">Quem segue</h2>
            <span id="game-followers-side-count">0</span>
          </div>
          <div class="people-list" id="game-followers-list"></div>
        </aside>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-client.js"></script>
  <script src="./user-search.js" defer></script>
  <script src="./navbar.js" defer></script>
  <script src="./video-player.js" defer></script>
  <script src="./media-lightbox.js" defer></script>
  <script src="./game.js" defer></script>
</body>
</html>
