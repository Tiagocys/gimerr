<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Entrar | Gimerr</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260710-3">
</head>
<body class="auth-page">
  <main class="auth-layout auth-layout-clean">
    <section class="auth-brand-panel" aria-labelledby="auth-slogan">
      <a class="auth-brand" href="/" aria-label="Gimerr">
        <img class="brand-logo" src="/assets/logo.svg" width="280" height="66" alt="Gimerr">
      </a>
      <h1 class="auth-slogan" id="auth-slogan">Um jogo de reputação</h1>
    </section>

    <section class="auth-card" aria-labelledby="auth-title">
      <div class="auth-form-heading">
        <h2 id="auth-title">Entrar no Gimerr</h2>
        <p>Entre e anuncie itens de jogos que você batalhou para conseguir.</p>
      </div>

      <div class="oauth-button-list">
        <button class="oauth-button google-button" id="google-auth" type="button" data-provider="google">
          <img src="/assets/google.svg" width="20" height="20" alt="">
          <span>Continuar com Google</span>
        </button>
        <button class="oauth-button discord-button" id="discord-auth" type="button" data-provider="discord">
          <img src="/assets/discord.svg" width="20" height="20" alt="">
          <span>Continuar com Discord</span>
        </button>
        <button class="oauth-button twitch-button" id="twitch-auth" type="button" data-provider="twitch">
          <img src="/assets/twitch.svg" width="20" height="20" alt="">
          <span>Continuar com Twitch</span>
        </button>
      </div>

      <p class="auth-feedback" id="auth-feedback" role="status"></p>
      <p class="auth-legal-links">
        Ao continuar, você concorda com os <a href="/terms">Termos de Uso</a> e a <a href="/privacy-policy">Política de Privacidade</a>.
      </p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth-client.js"></script>
  <script src="/sign-in.js" defer></script>
</body>
</html>
