<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Verificar conta | Gimerr</title>
  <link rel="stylesheet" href="/styles.css?v=20260722-text-wrap">
</head>
<body class="auth-page">
  <main class="auth-layout auth-layout-clean">
    <section class="auth-brand-panel" aria-labelledby="verify-title">
      <a class="auth-brand" href="/" aria-label="Gimerr">
        <img class="brand-logo" src="/assets/logo.svg" width="280" height="66" alt="Gimerr">
      </a>
      <h1 class="auth-slogan" id="verify-title">Sua conta foi verificada.</h1>
    </section>

    <section class="auth-card" aria-labelledby="verify-card-title">
      <div class="auth-form-heading discord-verify-confirmation">
        <h2 id="verify-card-title">Tudo certo.</h2>
        <span class="verify-loader" aria-hidden="true"></span>
        <p id="discord-verify-summary">Você será redirecionado para o Gimerr em instantes...</p>
      </div>

      <div class="oauth-button-list" id="discord-verify-actions">
        <button class="oauth-button discord-button" id="discord-verify-auth" type="button">
          <img src="/assets/discord.svg" width="20" height="20" alt="">
          <span>Continuar com Discord</span>
        </button>
      </div>

      <p class="auth-feedback" id="discord-verify-feedback" role="status"></p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth-client.js?v=20260722-silent-session-check"></script>
  <script src="/discord-verify.js?v=20260711-2" defer></script>
</body>
</html>
