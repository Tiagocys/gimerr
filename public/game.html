<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111827">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <title>Jogo | Gimerr</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <a class="brand" href="/" aria-label="Gimerr">
        <img class="brand-logo" src="./assets/logo.svg" alt="Gimerr">
      </a>

      <div class="search-box">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M10.8 18.1a7.3 7.3 0 1 1 5.1-2.1l4 4-1.4 1.4-4-4a7.3 7.3 0 0 1-3.7 1Zm0-2a5.3 5.3 0 1 0 0-10.6 5.3 5.3 0 0 0 0 10.6Z"/>
        </svg>
        <input id="game-search" type="search" placeholder="Buscar jogos e usuários" aria-label="Buscar jogos e usuários">
      </div>

      <nav class="top-actions" aria-label="Ações principais">
        <a class="auth-button" href="./sign-in.html" hidden>Entrar</a>
        <div class="account-menu" data-account-menu hidden></div>
      </nav>
    </header>

    <main class="game-layout is-loading" id="game-layout">
      <section class="game-hero" aria-labelledby="game-title">
        <div class="game-summary">
          <div class="game-main">
            <div class="game-identity">
              <div class="game-title-row">
                <div class="game-logo" id="game-logo">
                  <img src="./assets/avatar.svg" alt="">
                </div>
                <h1 id="game-title">Carregando jogo...</h1>
              </div>
              <p id="game-description">Buscando informações do jogo.</p>
              <div class="game-meta-list" id="game-meta-list"></div>
            </div>
          </div>

          <div class="game-actions">
            <button class="primary-button" id="game-follow-button" type="button" disabled>Seguir</button>
          </div>
        </div>

        <div class="game-stats" aria-label="Métricas do jogo">
          <button class="stat-button" id="game-followers-button" type="button" aria-controls="game-followers-panel" aria-expanded="false">
            <strong id="game-followers-count">0</strong>
            <span>seguidores</span>
          </button>
          <button class="stat-button stat-static game-stat-link" id="game-posts-button" type="button">
            <strong id="game-posts-count">0</strong>
            <span>anúncios</span>
          </button>
          <button class="stat-button stat-static game-stat-link" id="game-listings-button" type="button">
            <strong id="game-listings-count">0</strong>
            <span>anúncios</span>
          </button>
        </div>
      </section>

      <section class="game-grid">
        <section class="game-content" aria-label="Feed do jogo">
          <div class="profile-feed-header">
            <div>
              <h2>Marketplace</h2>
              <p id="game-feed-subtitle">Anúncios publicados para este jogo.</p>
            </div>
          </div>

          <section class="composer game-composer" id="game-composer" aria-label="Criar anúncio no jogo">
            <textarea id="game-composer-text" rows="4" maxlength="1200" placeholder="Descreva seu anúncio: itens, condições de compra, troca, entrega ou outras informações importantes."></textarea>
            <div class="listing-video-upload">
              <label class="text-button upload-button" for="game-composer-file">
                <svg aria-hidden="true" viewBox="0 0 24 24">
                  <path d="M17 10.5V6c0-1.1-.9-2-2-2H5C3.9 4 3 4.9 3 6v12c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2v-4.5l4 4v-11l-4 4Z"/>
                </svg>
                Adicionar vídeo
              </label>
              <span>Opcional: 1 vídeo de até 3 minutos e 500 MB.</span>
              <input id="game-composer-file" class="composer-video-input" type="file" accept="video/mp4,video/webm,video/quicktime">
            </div>
            <p class="composer-step-helper" id="game-composer-video-helper" hidden></p>
            <div class="composer-media" id="game-composer-media" hidden>
              <div class="composer-media-summary">
                <span id="game-composer-file-name"></span>
                <div class="composer-media-previews" id="game-composer-media-previews"></div>
              </div>
              <button class="text-button" id="game-composer-clear-file" type="button">Remover</button>
            </div>
            <div class="listing-composer-fields" id="game-listing-composer-fields" hidden>
              <label class="listing-currency-field" for="game-listing-currency">
                <span>Moeda do anúncio</span>
                <select id="game-listing-currency">
                  <option value="">Selecione uma moeda</option>
                  <option value="BRL">BRL - Real brasileiro</option>
                  <option value="USD">USD - Dólar americano</option>
                  <option value="EUR">EUR - Euro</option>
                  <option value="JPY">JPY - Iene japonês</option>
                  <option value="GBP">GBP - Libra esterlina</option>
                  <option value="CNY">CNY - Yuan chinês</option>
                </select>
              </label>
              <div class="listing-items" id="game-listing-items"></div>
              <button class="text-button listing-item-add" id="game-listing-item-add" type="button">Adicione mais 14 itens</button>
            </div>
            <div class="composer-footer">
              <p class="composer-submit-helper" id="game-composer-listing-helper" hidden></p>
              <div class="composer-actions">
                <button class="primary-button" id="game-publish-post" type="button">Publicar anúncio</button>
              </div>
            </div>
            <p class="field-feedback" id="game-composer-feedback" role="status"></p>
          </section>

          <div class="feed-list" id="game-feed-list"></div>
        </section>

        <aside class="game-followers-panel" id="game-followers-panel" aria-labelledby="game-followers-title">
          <div class="section-head">
            <h2 id="game-followers-title">Quem segue</h2>
            <div class="game-followers-panel-actions">
              <span id="game-followers-side-count">0</span>
              <button class="ghost-icon game-followers-close" id="game-followers-close" type="button" aria-label="Fechar seguidores">x</button>
            </div>
          </div>
          <div class="people-list" id="game-followers-list"></div>
        </aside>
      </section>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./auth-client.js"></script>
  <script src="./user-search.js" defer></script>
  <script src="./navbar.js" defer></script>
  <script src="./video-player.js" defer></script>
  <script src="./media-lightbox.js" defer></script>
  <script src="./vendor/qrcode.js" defer></script>
  <script src="./share-modal.js" defer></script>
  <script src="./game.js" defer></script>
</body>
</html>
